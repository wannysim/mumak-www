name: "Setup Node.js and pnpm"
description: "Setup Node.js (from .nvmrc), pnpm, and install dependencies with caching"

inputs:
  node-version-file:
    description: "Path to file containing Node.js version (e.g. .nvmrc, package.json)"
    required: false
    default: ".nvmrc"
  install-deps:
    description: "Whether to install dependencies"
    required: false
    default: "true"
  save-cache:
    description: "Whether to save pnpm cache after install"
    required: false
    default: "true"

outputs:
  pnpm-store-path:
    description: "pnpm store path"
    value: ${{ steps.pnpm-store.outputs.path }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node-version-file }}
        package-manager-cache: false

    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm cache
      id: pnpm-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Save pnpm cache
      if: inputs.save-cache == 'true' && steps.pnpm-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ steps.pnpm-cache.outputs.cache-primary-key }}
