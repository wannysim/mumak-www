name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "**/.oxlintrc.json"
      - ".oxfmtrc.jsonc"
      - ".nvmrc"
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/app-config/**"
  push:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "**/.oxlintrc.json"
      - ".oxfmtrc.jsonc"
      - ".nvmrc"
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/app-config/**"
  workflow_dispatch:
    inputs:
      scopes:
        description: "Comma-separated list of app names (optional, auto-detected if not provided)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  # Step 1: Detect which apps have changed
  detect-scopes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      scopes: ${{ steps.detect.outputs.scopes }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47

      - name: Detect changed apps
        id: detect
        uses: ./.github/actions/detect-scopes
        with:
          manual_scopes: ${{ inputs.scopes }}
          changed_files: ${{ steps.changed-files.outputs.all_changed_files }}

  # Step 2: Prepare matrix from detected scopes
  prepare-matrix:
    name: Prepare Matrix
    needs: detect-scopes
    if: needs.detect-scopes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.convert.outputs.matrix }}
      count: ${{ steps.convert.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Convert scopes to matrix
        id: convert
        uses: ./.github/actions/scopes-to-matrix
        with:
          scopes: ${{ needs.detect-scopes.outputs.scopes }}

  # Step 3: Warm the pnpm store cache once before any matrix job runs.
  # Parallel matrix jobs using the same pnpm-lock hash would otherwise race on
  # `actions/cache/save` and surface "Unable to reserve cache" warnings. Keeping
  # a single writer here lets all downstream jobs restore-only.
  warm-pnpm-cache:
    name: Warm pnpm cache
    needs: [detect-scopes]
    if: needs.detect-scopes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js and pnpm (save cache)
        uses: ./.github/actions/setup-node-pnpm
        with:
          save-cache: "true"

  # Step 4: Lint/format root-only files (scripts/, .cursor/, .ai/)
  # Runs in parallel with the per-app validate matrix.
  root-quality:
    name: Quality (root only)
    needs: [detect-scopes, warm-pnpm-cache]
    if: needs.detect-scopes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          save-cache: "false"

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-root-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-root-
            ${{ runner.os }}-turbo-

      - name: Lint (root files)
        run: pnpm turbo run lint:root

      - name: Format Check (root files)
        run: pnpm turbo run format:root:check

  # Step 5: Validate each app — lint, format, types, test, build (parallel matrix)
  validate:
    name: Validate (${{ matrix.app }})
    needs: [detect-scopes, prepare-matrix, warm-pnpm-cache]
    if: needs.detect-scopes.outputs.has_changes == 'true' && needs.prepare-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          save-cache: "false"

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.app }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.app }}-
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm turbo run lint --filter=${{ matrix.app }}

      - name: Format Check
        run: pnpm turbo run format:check --filter=${{ matrix.app }}

      - name: Type Check
        run: pnpm turbo run check-types --filter=${{ matrix.app }}

      - name: Test
        run: pnpm turbo run test:ci --filter=${{ matrix.app }}

      - name: Validate Content (blog only)
        if: matrix.app == 'blog'
        run: |
          pnpm turbo run validate:content --filter=blog
          pnpm turbo run validate:garden --filter=blog

      - name: Build
        run: pnpm turbo run build --filter=${{ matrix.app }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.app }}
          path: apps/${{ matrix.app }}/coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Append coverage summary
        if: always()
        run: |
          summary_file="apps/${{ matrix.app }}/coverage/coverage-summary.json"
          if [ ! -f "$summary_file" ]; then
            echo "### ${{ matrix.app }} — coverage summary unavailable" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "### ${{ matrix.app }} — coverage"
            echo ""
            echo "| Metric | Coverage |"
            echo "| --- | ---: |"
            jq -r '
              .total |
              [
                "| Statements | \(.statements.pct)% (\(.statements.covered)/\(.statements.total)) |",
                "| Branches   | \(.branches.pct)% (\(.branches.covered)/\(.branches.total)) |",
                "| Functions  | \(.functions.pct)% (\(.functions.covered)/\(.functions.total)) |",
                "| Lines      | \(.lines.pct)% (\(.lines.covered)/\(.lines.total)) |"
              ] | .[]
            ' "$summary_file"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # Step 6: Aggregate coverage from validate artifacts and upload to Codecov
  # Avoids the previous duplicate test:ci execution.
  coverage:
    name: Upload Coverage
    needs: [detect-scopes, validate]
    if: needs.detect-scopes.outputs.has_changes == 'true' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-artifacts

      # 앱별로 flag를 분리해 업로드해야 codecov 코멘트와 status가 앱 단위로 분리된다.
      # action 자체는 incremental upload를 지원해 여러 step으로 안전하게 호출 가능.
      - name: Upload blog coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-blog/lcov.info') != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-artifacts/coverage-blog/lcov.info
          flags: blog
          fail_ci_if_error: false

      - name: Upload mumak-next coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-mumak-next/lcov.info') != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-artifacts/coverage-mumak-next/lcov.info
          flags: mumak-next
          fail_ci_if_error: false

      - name: Upload mumak-react coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-mumak-react/lcov.info') != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-artifacts/coverage-mumak-react/lcov.info
          flags: mumak-react
          fail_ci_if_error: false

  # Summary job for branch protection
  ci-success:
    name: CI Success
    needs: [detect-scopes, warm-pnpm-cache, root-quality, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.detect-scopes.outputs.has_changes }}" != "true" ]; then
            echo "No relevant changes detected - CI passed"
            exit 0
          fi

          # If the warm-up job failed, downstream jobs are skipped. That must
          # not be misread as "no apps to validate" and silently pass CI.
          if [ "${{ needs.warm-pnpm-cache.result }}" != "success" ]; then
            echo "warm-pnpm-cache did not succeed (result: ${{ needs.warm-pnpm-cache.result }})"
            exit 1
          fi

          if [ "${{ needs.root-quality.result }}" == "success" ] && [ "${{ needs.validate.result }}" == "success" ]; then
            echo "All validations passed"
            exit 0
          elif [ "${{ needs.root-quality.result }}" == "success" ] && [ "${{ needs.validate.result }}" == "skipped" ]; then
            echo "Root quality passed, validations skipped (no apps to validate)"
            exit 0
          elif [ "${{ needs.root-quality.result }}" == "skipped" ] && [ "${{ needs.validate.result }}" == "skipped" ]; then
            echo "Validations skipped (no apps to validate)"
            exit 0
          else
            echo "Some validations failed"
            exit 1
          fi
